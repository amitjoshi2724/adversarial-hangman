<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>Hangman</h1>
                <div class="streak-container">
                    <span id="recordLabel">Record: 0/0</span>
                </div>
            </div>
            <div class="toggles-container">
                <div class="toggle-container">
                    <span class="toggle-label always-win-label">Always Win</span>
                    <label class="switch">
                        <input type="checkbox" id="godToggle">
                        <span class="slider round god-slider"></span>
                    </label>
                </div>
                <div class="toggle-container">
                    <span class="toggle-label">Regular</span>
                    <label class="switch">
                        <input type="checkbox" id="modeToggle" checked>
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label adversarial-label">Adversarial</span>
                </div>
                <div class="toggle-container guesses-container">
                    <span class="toggle-label">Guesses:</span>
                    <input type="number" id="guessesInput" value="10" min="6" max="19" class="guesses-input">
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="hangman-container">
                    <svg viewBox="0 0 200 250" class="hangman-svg" id="hangmanSvg">
                        <!-- Scaffold -->
                        <line x1="20" y1="230" x2="100" y2="230" class="scaffold" />
                        <line x1="60" y1="230" x2="60" y2="20" class="scaffold" />
                        <line x1="60" y1="20" x2="140" y2="20" class="scaffold" />
                        <line x1="140" y1="20" x2="140" y2="50" class="scaffold" />

                        <!-- Halo for Always Win Mode -->
                        <circle cx="140" cy="70" r="30" class="body-part part-halo hidden" style="stroke-dasharray: 6,5; stroke: #f59e0b; stroke-width: 2;" />

                        <!-- Body Parts (hidden by default, revealed per wrong guess) -->
                        <!-- 0: Head -->
                        <circle cx="140" cy="70" r="20" class="body-part part-0 hidden" />
                        <!-- 1: Body -->
                        <line x1="140" y1="90" x2="140" y2="160" class="body-part part-1 hidden" />
                        <!-- 2: Left Ear -->
                        <ellipse cx="118" cy="70" rx="4" ry="7" class="body-part part-2 hidden" />
                        <!-- 3: Right Ear -->
                        <ellipse cx="162" cy="70" rx="4" ry="7" class="body-part part-3 hidden" />
                        <!-- 4: Left Eye -->
                        <circle cx="133" cy="65" r="3" class="body-part part-4 hidden" />
                        <!-- 5: Right Eye -->
                        <circle cx="147" cy="65" r="3" class="body-part part-5 hidden" />
                        <!-- 6: Nose -->
                        <line x1="140" y1="69" x2="140" y2="76" class="body-part part-6 hidden" />
                        <!-- 7: Mouth -->
                        <path d="M 133,78 Q 140,85 147,78" class="body-part part-7 hidden" style="fill:none;" />
                        <!-- 8: Hair (3 strands) -->
                        <line x1="133" y1="51" x2="130" y2="43" class="body-part part-8 hidden" />
                        <line x1="140" y1="50" x2="140" y2="42" class="body-part part-8 hidden" />
                        <line x1="147" y1="51" x2="150" y2="43" class="body-part part-8 hidden" />
                        <!-- 9: Left Arm -->
                        <line x1="140" y1="105" x2="108" y2="130" class="body-part part-9 hidden" />
                        <!-- 10: Right Arm -->
                        <line x1="140" y1="105" x2="172" y2="130" class="body-part part-10 hidden" />
                        <!-- 11: Left Hand -->
                        <circle cx="105" cy="133" r="5" class="body-part part-11 hidden" />
                        <!-- 12: Right Hand -->
                        <circle cx="175" cy="133" r="5" class="body-part part-12 hidden" />
                        <!-- 13: Left Leg -->
                        <line x1="140" y1="160" x2="115" y2="200" class="body-part part-13 hidden" />
                        <!-- 14: Right Leg -->
                        <line x1="140" y1="160" x2="165" y2="200" class="body-part part-14 hidden" />
                        <!-- 15: Left Foot -->
                        <line x1="115" y1="200" x2="100" y2="207" class="body-part part-15 hidden" />
                        <!-- 16: Right Foot -->
                        <line x1="165" y1="200" x2="180" y2="207" class="body-part part-16 hidden" />
                        <!-- 17: Left Toes (3 nubs) -->
                        <line x1="108" y1="207" x2="108" y2="215" class="body-part part-17 hidden" />
                        <line x1="104" y1="207" x2="104" y2="215" class="body-part part-17 hidden" />
                        <line x1="100" y1="207" x2="100" y2="215" class="body-part part-17 hidden" />
                        <!-- 18: Right Toes (3 nubs) -->
                        <line x1="172" y1="207" x2="172" y2="215" class="body-part part-18 hidden" />
                        <line x1="176" y1="207" x2="176" y2="215" class="body-part part-18 hidden" />
                        <line x1="180" y1="207" x2="180" y2="215" class="body-part part-18 hidden" />
                    </svg>
                </div>

                <div class="word-container" id="wordDisplay">
                    <!-- Word characters will go here -->
                </div>

                <div class="status-message" id="statusMessage">
                    Ready to play?
                </div>
            </div>

            <div class="keyboard" id="keyboard">
                <!-- Keys will be generated by JS -->
            </div>

            <div class="bottom-controls">
                <button class="btn-restart" id="btnRestart" style="display: none;">Next Word</button>
                <button class="btn-icon" id="btnRefreshBot" title="Refresh">🔄 Refresh</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
