<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>Hangman</h1>
                <div class="streak-container"><span id="recordLabel">Record: 0/0</span></div>
            </div>
            <div class="toggles-container">
                <div class="toggle-container">
                    <span class="toggle-label always-win-label">Always Win</span>
                    <label class="switch"><input type="checkbox" id="godToggle"><span
                            class="slider round god-slider"></span></label>
                </div>
                <div class="toggle-container">
                    <span class="toggle-label">Regular</span>
                    <label class="switch"><input type="checkbox" id="modeToggle" checked><span
                            class="slider round"></span></label>
                    <span class="toggle-label adversarial-label">Adversarial</span>
                </div>
                <div class="mode-description">
                    In Adversarial mode, the game decides the word as you play to keep you guessing longer
                </div>
                <div class="toggle-container guesses-container">
                    <span class="toggle-label" id="guessesLabel">Guess Limit:</span>
                    <input type="number" id="guessesInput" value="10" min="6" max="26" class="guesses-input">
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="hangman-container">
                    <svg viewBox="0 0 200 260" class="hangman-svg" id="hangmanSvg">
                        <line x1="20" y1="240" x2="100" y2="240" class="scaffold" />
                        <line x1="60" y1="240" x2="60" y2="20" class="scaffold" />
                        <line x1="60" y1="20" x2="140" y2="20" class="scaffold" />
                        <line x1="140" y1="20" x2="140" y2="50" class="scaffold" />
                        <!-- Halo -->
                        <circle cx="140" cy="70" r="30" class="body-part part-halo hidden"
                            style="stroke-dasharray:6,5;stroke:#f59e0b;stroke-width:2;" />
                        <!-- 0 Head -->
                        <circle cx="140" cy="70" r="20" class="body-part part-0 hidden" />
                        <!-- 1 Body -->
                        <line x1="140" y1="90" x2="140" y2="160" class="body-part part-1 hidden" />
                        <!-- 2 L Ear -->
                        <ellipse cx="118" cy="70" rx="4" ry="7" class="body-part part-2 hidden" />
                        <!-- 3 R Ear -->
                        <ellipse cx="162" cy="70" rx="4" ry="7" class="body-part part-3 hidden" />
                        <!-- 4 L Eye -->
                        <circle cx="133" cy="65" r="3" class="body-part part-4 hidden" />
                        <!-- 5 R Eye -->
                        <circle cx="147" cy="65" r="3" class="body-part part-5 hidden" />
                        <!-- 6 Nose -->
                        <line x1="140" y1="69" x2="140" y2="76" class="body-part part-6 hidden" />
                        <!-- 7 Mouth -->
                        <path d="M 133,78 Q 140,85 147,78" class="body-part part-7 hidden" style="fill:none;" />
                        <!-- 8 Hair -->
                        <line x1="133" y1="51" x2="130" y2="43" class="body-part part-8 hidden" />
                        <line x1="140" y1="50" x2="140" y2="42" class="body-part part-8 hidden" />
                        <line x1="147" y1="51" x2="150" y2="43" class="body-part part-8 hidden" />
                        <!-- 9  L Arm -->
                        <line x1="140" y1="105" x2="108" y2="130" class="body-part part-9  hidden" />
                        <!-- 10 R Arm -->
                        <line x1="140" y1="105" x2="172" y2="130" class="body-part part-10 hidden" />
                        <!-- 11 L Hand -->
                        <circle cx="105" cy="133" r="5" class="body-part part-11 hidden" />
                        <!-- 12 R Hand -->
                        <circle cx="175" cy="133" r="5" class="body-part part-12 hidden" />
                        <!-- 13 L Leg -->
                        <line x1="140" y1="160" x2="115" y2="202" class="body-part part-13 hidden" />
                        <!-- 14 R Leg -->
                        <line x1="140" y1="160" x2="165" y2="202" class="body-part part-14 hidden" />
                        <!-- 15 L Foot -->
                        <line x1="115" y1="202" x2="100" y2="208" class="body-part part-15 hidden" />
                        <!-- 16 R Foot -->
                        <line x1="165" y1="202" x2="180" y2="208" class="body-part part-16 hidden" />
                        <!-- 17 L Toes -->
                        <line x1="108" y1="208" x2="108" y2="216" class="body-part part-17 hidden" />
                        <line x1="104" y1="208" x2="104" y2="216" class="body-part part-17 hidden" />
                        <line x1="100" y1="208" x2="100" y2="216" class="body-part part-17 hidden" />
                        <!-- 18 R Toes -->
                        <line x1="172" y1="208" x2="172" y2="216" class="body-part part-18 hidden" />
                        <line x1="176" y1="208" x2="176" y2="216" class="body-part part-18 hidden" />
                        <line x1="180" y1="208" x2="180" y2="216" class="body-part part-18 hidden" />
                        <!-- 19 L Eyebrow -->
                        <line x1="127" y1="58" x2="138" y2="56" class="body-part part-19 hidden" />
                        <!-- 20 R Eyebrow -->
                        <line x1="142" y1="56" x2="153" y2="58" class="body-part part-20 hidden" />
                        <!-- 21 L Fingers -->
                        <line x1="101" y1="138" x2="97" y2="145" class="body-part part-21 hidden" />
                        <line x1="104" y1="138" x2="103" y2="146" class="body-part part-21 hidden" />
                        <line x1="107" y1="138" x2="107" y2="145" class="body-part part-21 hidden" />
                        <!-- 22 R Fingers -->
                        <line x1="173" y1="138" x2="172" y2="145" class="body-part part-22 hidden" />
                        <line x1="176" y1="138" x2="177" y2="146" class="body-part part-22 hidden" />
                        <line x1="179" y1="138" x2="183" y2="145" class="body-part part-22 hidden" />
                        <!-- 23 Belly Button -->
                        <circle cx="140" cy="125" r="3" class="body-part part-23 hidden" />
                        <!-- 24 L Knee -->
                        <ellipse cx="127" cy="181" rx="4" ry="6" class="body-part part-24 hidden" />
                        <!-- 25 R Knee -->
                        <ellipse cx="153" cy="181" rx="4" ry="6" class="body-part part-25 hidden" />
                    </svg>
                </div>
                <div class="word-container" id="wordDisplay"></div>
                <div class="status-message" id="statusMessage">Ready to play?</div>
            </div>
            <div class="keyboard" id="keyboard"></div>
            <div class="bottom-controls">
                <button class="btn-restart" id="btnRestart" style="display:none;">Next Word</button>
                <button class="btn-icon" id="btnRefreshBot">🔄 Refresh</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
