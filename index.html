<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>Hangman</h1>
                <div class="streak-container">
                    <span id="recordLabel">Record: 0/0</span>
                </div>
            </div>
            <div class="toggles-container">
                <div class="toggle-container">
                    <span class="toggle-label god-label">God Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="godToggle">
                        <span class="slider round god-slider"></span>
                    </label>
                </div>
                <div class="toggle-container">
                    <span class="toggle-label">Regular</span>
                    <label class="switch">
                        <input type="checkbox" id="modeToggle" checked>
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label adversarial-label">Adversarial</span>
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="hangman-container">
                    <svg viewBox="0 0 200 250" class="hangman-svg" id="hangmanSvg">
                        <!-- Scaffold -->
                        <line x1="20" y1="230" x2="100" y2="230" class="scaffold" />
                        <line x1="60" y1="230" x2="60" y2="20" class="scaffold" />
                        <line x1="60" y1="20" x2="140" y2="20" class="scaffold" />
                        <line x1="140" y1="20" x2="140" y2="50" class="scaffold" />
                        
                        <!-- Parts to reveal (hidden by default via CSS classes) -->
                        <circle cx="140" cy="70" r="20" class="body-part part-0 hidden" /> <!-- Head -->
                        <line x1="140" y1="90" x2="140" y2="150" class="body-part part-1 hidden" /> <!-- Body -->
                        <line x1="140" y1="100" x2="110" y2="130" class="body-part part-2 hidden" /> <!-- L Arm -->
                        <line x1="140" y1="100" x2="170" y2="130" class="body-part part-3 hidden" /> <!-- R Arm -->
                        <line x1="140" y1="150" x2="110" y2="190" class="body-part part-4 hidden" /> <!-- L Leg -->
                        <line x1="140" y1="150" x2="170" y2="190" class="body-part part-5 hidden" /> <!-- R Leg -->
                    </svg>
                </div>
                
                <div class="word-container" id="wordDisplay">
                    <!-- Word characters will go here -->
                </div>
                
                <div class="status-message" id="statusMessage">
                    Ready to play?
                </div>
            </div>

            <div class="keyboard" id="keyboard">
                <!-- Keys will be generated by JS -->
            </div>
            
            <div class="bottom-controls" style="display: flex; gap: 1rem; align-items: center; justify-content: center;">
                <button class="btn-restart" id="btnRestart" style="display: none;">Next Word</button>
                <button class="btn-icon" id="btnRefreshBot" title="Refresh" style="background: var(--keyboard-bg); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 1rem; font-weight: 600; color: white;">🔄 Refresh</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
